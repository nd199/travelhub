server:
  port: 8080

spring:
  application:
    name: transport-booking-system
  main:
    allow-circular-references: true
  sql:
    init:
      mode: always
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5323/transport_booking}
    username: postgres
    password: postgres123
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      enabled: false
  management:
    endpoints:
      web:
        exposure:
          include: health,info,metrics
    endpoint:
      health:
        show-details: always
  thymeleaf:
    check-template-location: false
logging:
  level:
    com.naren.backend: INFO
    org.springframework.web: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.flyway: INFO

# JWT Configuration
jwt:
  secret: mySecretKeyForTravelHubBackend2024
  expiration: 86400 # 24 hours in seconds
  refresh-token:
    expiration: 604800 # 7 days in seconds
app:
  data-initialization:
    enabled: ${APP_DATA_INITIALIZATION_ENABLED:false}