spring:
  application:
    name: transport-booking-system
  main:
    allow-circular-references: true
  sql:
    init:
      mode: always
  datasource:
    url: jdbc:postgresql://localhost:5432/transport_booking
    username: postgres
    password: postgres123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  management:
    endpoints:
      web:
        exposure:
          include: health,info,metrics
    endpoint:
      health:
        show-details: always
  thymeleaf:
    check-template-location: false
logging:
  level:
    com.naren.backend: INFO
    org.springframework.web: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.flyway: INFO

# JWT Configuration
jwt:
  secret: mySecretKeyForTravelHubBackend2024
  expiration: 86400 # 24 hours in seconds
  refresh-token:
    expiration: 604800 # 7 days in seconds