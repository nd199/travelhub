spring:
  application:
    name: transport-booking-system
  datasource:
    url: jdbc:postgresql://localhost:5432/transport_booking
    username: postgres
    password: postgres123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
logging:
  level:
    com.naren.backend: DEBUG
    org.springframework.web: DEBUG